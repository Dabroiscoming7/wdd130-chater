<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexy Chater Contact Us</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="images/guitar.jpg" alt="Lexy Chater Logo">
            </a>
            <nav>
                <a href="families.html">instrument families</a>
                <a href="history.html">history and culture</a>
                <a href="contact.html">contact us</a>
            </nav>
        </div>
    </header>

    <section class="page-title">
        <h1>CONTACT US</h1>
    </section>

    <main>
        <section class="contact-content">
            <div class="contact-form-container">
                <h2>Get in Touch</h2>
                <p>Have questions about music or want to learn more? We'd love to hear from you!</p>
                
                <form class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>MUSIC IS A UNIVERSAL LANGUAGE</p>
    </footer>
</body>
</html>
